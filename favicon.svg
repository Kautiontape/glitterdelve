<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Glitterdelve gem">
  <defs>
    <linearGradient id="gem" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ec6fb0"/>
      <stop offset="0.55" stop-color="#9b6cf0"/>
      <stop offset="1" stop-color="#3fb6d3"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="7" fill="#0e0b16"/>
  <!-- faceted gem -->
  <path d="M16 4 L26 13 L16 28 L6 13 Z" fill="url(#gem)" stroke="#ffe14d" stroke-width="1.3" stroke-linejoin="round"/>
  <!-- facet lines, catching the light -->
  <path d="M6 13 H26" stroke="#ffe14d" stroke-width="0.9" opacity="0.65"/>
  <path d="M16 4 V13" stroke="#ffe14d" stroke-width="0.7" opacity="0.45"/>
  <path d="M11 13 L16 28 M21 13 L16 28" stroke="#fff2a8" stroke-width="0.7" opacity="0.4"/>
  <!-- top-facet glint -->
  <path d="M12.5 8.5 L15.5 7.5 L13.5 11.5 Z" fill="#ffffff" opacity="0.3"/>
</svg>
